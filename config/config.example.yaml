# AutoPOI — Config Template
# Copy file này thành config.yaml và điền thông tin thực tế
# KHÔNG commit config.yaml lên git (đã có trong .gitignore)

# ─── BRAIN ENGINE ──────────────────────────────────────────────────────────
# Chọn AI engine để phân tích dữ liệu POI:
#   "gemini"  → Google Gemini API (nhanh, cần API key, giới hạn 1,500 req/ngày/key)
#   "searxng" → SearXNG + Playwright + Ollama (self-hosted, FREE, không giới hạn)
engine: "gemini"

google:
  places_api_key: "YOUR_GOOGLE_PLACES_API_KEY"
  # Đăng ký tại: https://console.cloud.google.com
  # Free tier: $200 credit/tháng ≈ 5,800 POI miễn phí

gemini:
  # Dùng 1 key:
  api_key: "YOUR_GEMINI_API_KEY_1"

  # Hoặc thêm nhiều key (mỗi step dùng 1 key khác → tải đều ra 3 account free):
  api_keys:
    - "AIzaSyA_iSVWCQ8nzs1E2X4rjnAQZH9rkhY-FIo"   # Step 1: Hours + Status + Category
    - "AIzaSyA6wvW2TdPTqLpORG0lDTeZ7kbgGVVbvB4"   # Step 2: Opening Date
    - "AIzaSyBs4OWTgU5dn4nyMVrhu1OKTeqvoXohMDQ"   # Step 3: Shopping Center

  model: "gemini-2.5-flash-lite"
  # Đăng ký tại: https://aistudio.google.com
  # Free tier mỗi key: 1,500 requests/day, 1M tokens/min
  # 3 keys = 4,500 requests/day ~ 1,500 POI/ngày

chrome:
  # Step 2c: Dùng Chrome thật với profile người dùng để tìm Opening Date
  # Cần cài: pip install selenium
  #
  # profile_path:
  #   "auto"          → tự detect theo máy hiện tại (Windows/Mac/Linux) ← khuyến nghị
  #   "guest"         -> luôn dùng Chrome khách (nhanh nhất)
  #   ""              -> tắt Chrome hoàn toàn
  #   "C:\Users\...\Google\Chrome\User Data"  -> chỉ định cụ thể
  profile_path: "guest"
  profile_dir: "Default"   # "Default" | "Profile 1" | "Profile 2" | ...
  offscreen_x: -3000        # Đẩy Chrome ra ngoài màn hình (user không thấy)
  page_wait: 3              # Giây chờ trang load

jira:
  url: "https://COMPANY.atlassian.net"  # cập nhật sau khi có access
  username: "your@email.com"
  api_token: "YOUR_JIRA_API_TOKEN"      # tạo tại: Account Settings → Security
  project_key: "POID"                   # cập nhật sau khi có access

venue_editor:
  url: "https://..."                    # cập nhật sau khi có access
  username: "your@email.com"
  password: "YOUR_VE_PASSWORD"
  api_key: ""                           # điền nếu VE có API key

pipeline:
  parallel_jobs: 3          # Số job chạy song song (tăng dần sau test)
  delay_between_actions: 2.5  # Giây delay giữa các thao tác (tránh bot detection)
  delay_between_jobs: 5.0    # Giây delay giữa các job
  max_retries: 3
  retry_delay: 30            # Giây chờ trước khi retry

# ─── SEARXNG + OLLAMA (Self-hosted Engine) ────────────────────────────────
# Chỉ cần điền khi engine: "searxng"
# Hướng dẫn cài SearXNG: docker run -d -p 8888:8080 searxng/searxng
# Hướng dẫn cài Ollama:  https://ollama.com  →  ollama pull llama3.1:8b
searxng:
  url: "http://localhost:8888"  # URL SearXNG self-hosted (hoặc IP VPS)
  max_results: 5                # Số URL tối đa mỗi lần tìm kiếm

ollama:
  url: "http://localhost:11434"  # URL Ollama local (hoặc IP VPS)
  # Models khuyến nghị với RTX 5060Ti 16GB:
  #   llama3.1:8b   → 6GB VRAM, nhanh, tốt tiếng Anh (khuyến nghị)
  #   mistral:7b    → 5GB VRAM, nhanh hơn một chút
  #   llama3.1:70b  → cần 40GB VRAM, quá sức với 16GB
  model: "llama3.1:8b"
  timeout: 120  # Giây chờ Ollama trả kết quả

osm:
  overpass_url: "https://overpass-api.de/api/interpreter"  # Free
  timeout: 30

logging:
  level: "INFO"              # DEBUG / INFO / WARNING / ERROR
  file: "logs/autopoi.log"
  max_size_mb: 50
